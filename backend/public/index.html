<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SignalSense AI — Login</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="sig-icon"><span class="sr"></span><span class="sy"></span><span class="sg"></span></div>
      <span class="auth-brand">Signal<em>Sense</em> AI</span>
    </div>
    <h1 class="auth-title">Command Centre</h1>
    <p class="auth-sub">Smart City Traffic Analytics Platform v2.0</p>
    <div class="alert-box alert-error" id="err"></div>
    <form id="loginForm">
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="email" placeholder="admin@signalsense.ai" required autocomplete="email"></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="password" placeholder="Password" required></div>
      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign in</button>
    </form>
    <p style="margin-top:18px;font-size:11px;color:var(--text3);text-align:center">SignalSense AI v2.0 · Secure access · All sessions logged</p>
  </div>
</div>
<script>
  if (localStorage.getItem('ss_token')) window.location.href = '/app.html';
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('err');
    err.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem('ss_token', data.token);
      localStorage.setItem('ss_user', JSON.stringify(data.user));
      window.location.href = '/app.html';
    } catch (e) {
      err.textContent = e.message; err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
