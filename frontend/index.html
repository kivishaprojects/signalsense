<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SignalSense AI — Login</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-signal-icon"><span class="sr"></span><span class="sy"></span><span class="sg"></span></div>
      <span class="auth-brand">Signal<em>Sense</em> AI</span>
    </div>
    <h1 class="auth-title">Command Centre Login</h1>
    <p class="auth-sub">Smart City Traffic Analytics Platform</p>

    <div class="alert-box alert-error" id="err-box"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="form-input" id="email" placeholder="admin@signalsense.ai" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Sign in to dashboard</button>
    </form>

    <p style="margin-top:20px;font-size:12px;color:var(--text3);text-align:center">
      Secure access · All sessions are logged · SignalSense AI v1.0
    </p>
  </div>
</div>

<script>
  const API = '/api';
  if (localStorage.getItem('ss_token')) window.location.href = '/app.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errBox = document.getElementById('err-box');
    errBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('ss_token', data.token);
      localStorage.setItem('ss_user', JSON.stringify(data.user));
      window.location.href = '/app.html';
    } catch (err) {
      errBox.textContent = err.message;
      errBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign in to dashboard';
    }
  });
</script>
</body>
</html>
